<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heavenly Court Frame Tester</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://g.twimg.com/a/embedded-app-sdk/1.0.0/discord-embedded-app-sdk.umd.js"></script>
</head>
<body>
    <div id="app">
        <h1>🌌 Heavenly Court Visualizer</h1>
        <p id="welcome-text">Loading client connection...</p>
        
        <div class="visualizer-container">
            <div class="card-area">
                <img id="card-image" src="https://i.pinimg.com/1200x/5c/45/a6/5c45a6b23447a2ad2755c0768fd9de46.jpg" alt="Card Showcase">
                <div id="frame-overlay"></div>
            </div>


            <div class="controls-area">
                <h3>Select a Frame</h3>
                <button class="frame-btn" data-frame="voidspawn">Voidspawn Frame (40 🎟️)</button>
                <button class="frame-btn" data-frame="polaroid">Polaroid Frame (100 🎟️)</button>
                <button class="frame-btn" data-frame="none">Clear Frame</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
