<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heavenly Court Frame Tester</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://g.twimg.com/a/embedded-app-sdk/1.0.0/discord-embedded-app-sdk.umd.js"></script>
</head>
<body>
    <div id="app">
        <h1>🌌 Heavenly Court Visualizer</h1>
        <p id="welcome-text">Loading client connection...</p>
        
        <div class="visualizer-container">
            <img id="card-image" src="https://i.pinimg.com/736002/your-default-card.jpg" alt="Character Card">
            <img id="frame-overlay" src="" alt="Frame Overlay" class="hidden">
        </div>

        <div class="controls-area">
            <h3>Select a Frame</h3>
            <button class="frame-btn" id="mirrored-energy-btn">Mirrored Energy Frame</button>
            <button class="frame-btn" id="remove-frame-btn">Clear Frame</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
